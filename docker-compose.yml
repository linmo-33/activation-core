version: "3.8"

services:
  activation-core-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: activation-core
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # 数据持久化：将宿主机的data目录挂载到容器
      - ./data:/app/data
    networks:
      - activation-core-network

# 定义网络
networks:
  activation-core-network:
    driver: bridge

# 定义卷（如果需要命名卷而非绑定挂载）
volumes:
  activation-core-data:
    driver: local
